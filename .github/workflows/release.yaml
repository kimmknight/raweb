name: Create draft release with prepared assets

on:
  workflow_dispatch:

jobs:
  build-guacd:
    name: Build guacd WSL distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build guacd WSL distribution
        id: guacd
        uses: ./.github/actions/build-guacd

      - name: Upload guacd.wsl artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: guacd.wsl
          path: ${{ steps.guacd.outputs.guacd_path }}

  build_and_release:
    name: Build and release
    runs-on: windows-latest
    needs: build-guacd
    permissions:
      contents: write

    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          today=$(date +'%Y.%m.%d')
          default_version="v${today}.0"

          # fetch the latest release tag name
          latest_version=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' || echo "")

          # check if we successfully got a latest version and if its date matches today's date
          if [ -n "$latest_version" ] && [[ "$latest_version" =~ ^v([0-9]{4}\.[0-9]{2}\.[0-9]{2})\.([0-9]+)$ ]]; then
            latest_date="${BASH_REMATCH[1]}"
            latest_increment="${BASH_REMATCH[2]}"

            if [ "$latest_date" == "$today" ]; then
              # date matches; increment the number
              new_increment=$(($latest_increment + 1))
              new_version="v${today}.${new_increment}"
            else
              # date does not match; use the default version with .0
              new_version="$default_version"
            fi
          else
            # No latest release found or format is unexpected, use the default version with .0
            new_version="$default_version"
          fi

          echo "Using version $new_version"
          echo "version=$new_version" >> $GITHUB_OUTPUT

      - name: Clean version string
        id: clean_version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # remove 'v' prefix
          VERSION=${VERSION#v}

          # split by '.' and remove leading zeros from each part
          IFS='.' read -ra ADDR <<< "$VERSION"
          CLEAN_VERSION=""
          for i in "${ADDR[@]}"; do
            # remove leading zeros unless it's a single zero
            CLEAN_VERSION+="$(echo "$i" | sed 's/^0\([0-9]\)/\1/g')."
          done
          CLEAN_VERSION=${CLEAN_VERSION%.} # remove trailing dot

          echo "clean_version=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "Setting FileVersion to $CLEAN_VERSION"

      - name: "Update .csproj FileVersion"
        if: success()
        shell: bash
        run: |
          CLEAN_VERSION="${{ steps.clean_version.outputs.clean_version }}"

          CSPROJ_FILES=(
            "dotnet/RAWebServer/RAWebServer.csproj"
            "dotnet/RAWeb.Server.Utilities/RAWeb.Server.Utilities.csproj"
            "dotnet/RAWeb.Server.Management/RAWeb.Server.Management.csproj"
            "dotnet/RAWeb.Server.Management.ServiceHost/RAWeb.Server.Management.ServiceHost.csproj"
          )

          # loop through each file path
          for CSPROJ_FILE in "${CSPROJ_FILES[@]}"; do            
            echo "Updating FileVersion in $CSPROJ_FILE to $CLEAN_VERSION"
            sed -i'' -E "s|(<FileVersion>)[0-9\.]+(</FileVersion>)|\1$CLEAN_VERSION\2|g" "$CSPROJ_FILE"
            
            # check if the sed command actually modified the file
            if [ $? -ne 0 ]; then
              echo "Warning: Failed to update or find <FileVersion> tag in $CSPROJ_FILE."
            fi
          done

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.15.0"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: cd frontend && pnpm install

      - name: Build the frontend (no embedded docs)
        run: cd frontend && pnpm run build
        env:
          RAWEB_EXCLUDE_DOCS: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
          cache: false

      - name: Restore .NET solution
        run: dotnet restore RAWeb.sln --locked-mode

      - name: Build .NET solution
        run: dotnet build RAWeb.sln --configuration Release --no-restore

      - name: Replace App_Code and bin directories with build output
        shell: bash
        run: |
          rm -rf dotnet/RAWebServer/App_Code
          rm -rf dotnet/RAWebServer/src
          rm -rf dotnet/RAWebServer/ext
          rm -rf dotnet/RAWebServer/obj
          rm -rf dotnet/RAWebServer/bin
          rm -rf dotnet/RAWebServer/RAWebServer.csproj
          rm -rf dotnet/RAWebServer/packages.lock.json
          rm -rf dotnet/RAWebServer/.gitignore
          rm -rf dotnet/RAWebServer/.vscode
          cp -r dotnet/RAWebServer/build/bin dotnet/RAWebServer/bin
          rm -rf dotnet/RAWebServer/build

      - name: Move repository setup.ps1 to dotnet/RAWebServer so it is included in the release archive
        shell: bash
        run: |
          mv setup.ps1 dotnet/RAWebServer/setup.ps1

      # modify setup.ps1 to replace $source_dir = "dotnet\RAWebServer" with $source_dir = ""
      # since the setup.ps1 is now in the same folder as the files to install
      - name: Modify setup.ps1 for altered location
        shell: bash
        run: |
          find='$source_dir = "dotnet\\RAWebServer"'
          replace='$source_dir = ""'
          file='dotnet/RAWebServer/setup.ps1'

          sed -i "s|$find|$replace|g" "$file"

      - name: Generate archive (no web connect) (no embedded docs)
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: "zip"
          directory: dotnet/RAWebServer/
          filename: "../../raweb_${{ steps.version.outputs.version }}__no_web_connect__no_docs.zip"

      - name: Download guacd.wsl
        uses: actions/download-artifact@v4
        with:
          name: guacd.wsl
          path: dotnet/RAWebServer/bin

      - name: Confirm guacd.wsl is present
        shell: bash
        run: |
          if [ ! -f "dotnet/RAWebServer/bin/guacd.wsl" ]; then
            echo "guacd.wsl not found in expected location: dotnet/RAWebServer/bin/guacd.wsl"
            exit 1
          fi

      - name: Generate archive (no embedded docs)
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: "zip"
          directory: dotnet/RAWebServer/
          filename: "../../raweb_${{ steps.version.outputs.version }}__no_docs.zip"

      - name: Build the frontend
        run: cd frontend && pnpm run build

      - name: Generate archive
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: "zip"
          directory: dotnet/RAWebServer/
          filename: "../../raweb_${{ steps.version.outputs.version }}.zip"

      - name: Remove guacd.wsl
        shell: bash
        run: rm -f dotnet/RAWebServer/bin/guacd.wsl

      - name: Generate archive (no web connect)
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: "zip"
          directory: dotnet/RAWebServer/
          filename: "../../raweb_${{ steps.version.outputs.version }}__no_web_connect.zip"

      - name: Write release install.ps1
        shell: bash
        run: |
          scriptContent=$(cat <<'EOF'
          [CmdletBinding()]
          Param(
              [switch]$Express,
              [switch]$Overwrite,
              [string]$InstallDir        = "",
              [string]$WebSite           = "",
              [string]$VirtualPath       = "",
              [string]$AnonymousAuthMode = "",
              [switch]$AcceptAll
          )

          function New-TemporaryDirectory {
              $tmp = [System.IO.Path]::GetTempPath()
              $name = (New-Guid).ToString("N")
              New-Item -ItemType Directory -Path (Join-Path $tmp $name)
          }

          function Expand-ArchiveQuiet {
              param(
                  [Parameter(Mandatory)]
                  [string]$Path,
                  
                  [Parameter(Mandatory)]
                  [string]$DestinationPath,
                  
                  [switch]$Force
              )
              
              Add-Type -AssemblyName System.IO.Compression.FileSystem
              
              $resolvedPath = $ExecutionContext.SessionState.Path.GetUnresolvedProviderPathFromPSPath($Path)
              $resolvedDest = $ExecutionContext.SessionState.Path.GetUnresolvedProviderPathFromPSPath($DestinationPath)
              
              if (-not (Test-Path $resolvedPath)) {
                  throw "Cannot find path '$resolvedPath' because it does not exist."
              }
              
              if (-not (Test-Path $resolvedDest)) {
                  New-Item -Path $resolvedDest -ItemType Directory -Force | Out-Null
              }
              
              if ($Force) {
                  $zip = [System.IO.Compression.ZipFile]::OpenRead($resolvedPath)
                  try {
                      foreach ($entry in $zip.Entries) {
                          $targetPath = Join-Path $resolvedDest $entry.FullName
                          if (Test-Path $targetPath) {
                              Remove-Item -Path $targetPath -Force -Recurse
                          }
                      }
                  }
                  finally {
                      $zip.Dispose()
                  }
              }
              
              [System.IO.Compression.ZipFile]::ExtractToDirectory($resolvedPath, $resolvedDest)
          }

          try {
              $ProgressPreference = 'SilentlyContinue'
              $originalTitle = $Host.UI.RawUI.WindowTitle
              $Host.UI.RawUI.WindowTitle = "RAWeb Downloader & Installer"

              Write-Host ""
              Write-Host "┌─" -NoNewline
              Write-Host   " RAWeb Installer " -NoNewline -ForegroundColor Green
              Write-Host                    "──────────────────────────────┐"
              Write-Host "│                                                │"
              Write-Host "│  Please wait while we download the installer.  │"
              Write-Host "│                                                │"
              Write-Host "└────────────────────────────────────────────────┘"
              Write-Host "${{ steps.version.outputs.version }}" -ForegroundColor DarkGray
              Write-Host ""
              
              # show indeterminate progress
              Write-Host -NoNewline ([char]27 + "]9;4;3" + [char]7)

              # create a temporary directory and do everything there
              Set-Location (New-TemporaryDirectory)

              # download and extract the release archive
              $zipUrl = "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/raweb_${{ steps.version.outputs.version }}.zip"
              $zipPath = Join-Path $pwd "raweb_${{ steps.version.outputs.version }}.zip"
              Write-Host "[1/3] Downloading..." -ForegroundColor Cyan
              Write-Verbose "Downloading $zipUrl to $zipPath"
              Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath
              Write-Host "[2/3] Extracting..." -ForegroundColor Cyan
              Expand-ArchiveQuiet -Path $zipPath -DestinationPath $pwd -Force
              Remove-Item -Path $zipPath
              Write-Host "[3/3] Starting..." -ForegroundColor Cyan
              Write-Host ""

              # clear indeterminate progress
              Write-Host -NoNewline ([char]27 + "]9;4;0" + [char]7)

              # build the argument list and forward all provided parameters to setup.ps1
              $setupArgs = @()
              if ($Express)           { $setupArgs += '-Express' }
              if ($Overwrite)         { $setupArgs += '-Overwrite' }
              if ($AcceptAll)         { $setupArgs += '-AcceptAll' }
              if ($InstallDir)        { $setupArgs += '-InstallDir';        $setupArgs += $InstallDir }
              if ($WebSite)           { $setupArgs += '-WebSite';           $setupArgs += $WebSite }
              if ($VirtualPath)       { $setupArgs += '-VirtualPath';       $setupArgs += $VirtualPath }
              if ($AnonymousAuthMode) { $setupArgs += '-AnonymousAuthMode'; $setupArgs += $AnonymousAuthMode }

              Write-Verbose "Running setup.ps1 with args: $setupArgs"
              powershell.exe -NoProfile -ExecutionPolicy Bypass -File ".\setup.ps1" @setupArgs
          } finally {
              # clean up
              Write-Host "Cleaning up downloaded files..." -ForegroundColor Cyan
              Write-Host -NoNewline ([char]27 + "]9;4;3" + [char]7) # show indeterminate progress
              $loc = $pwd
              Set-Location ~
              Remove-Item -Path $loc -Recurse -Force
              Write-Host "Cleanup complete." -ForegroundColor Green
              Write-Host -NoNewline ([char]27 + "]9;4;0" + [char]7) # clear indeterminate progress
              $Host.UI.RawUI.WindowTitle = $originalTitle
          }
          EOF
          )

          encodedScriptContent=$(echo -n "$scriptContent" | iconv -f UTF-8 -t UTF-16LE | base64 -w 0)

          cat > "install.ps1" <<EOF
          # RAWeb Installer Script Launcher

          # Build parameter string to pass along
          \$paramString = \$args -join ' '

          # Ensure we are running as an administrator
          \$is_admin = ([Security.Principal.WindowsPrincipal][Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole] "Administrator")

          if (-not \$is_admin) {    
              # Prefer to relaunch in Windows Terminal
              if (Get-Command wt.exe -ErrorAction SilentlyContinue) {
                  Start-Process wt.exe -Verb RunAs -ArgumentList "powershell -NoExit -Command \`"& { . ([ScriptBlock]::Create([System.Text.Encoding]::Unicode.GetString([System.Convert]::FromBase64String('${encodedScriptContent}')))) \$paramString }\`""
              } else {
                  Start-Process powershell -Verb RunAs -ArgumentList "-NoExit -Command \`"& { . ([ScriptBlock]::Create([System.Text.Encoding]::Unicode.GetString([System.Convert]::FromBase64String('${encodedScriptContent}')))) \$paramString }\`""
              }
              
              # Exit if fresh session
              if ((Get-History).Count -le 1) {
                  exit
              }

              return;
          }

          # Check if running in Windows Terminal, and if not, relaunch in Windows Terminal (if available)
          if ((-not \$env:WT_SESSION) -and (Get-Command wt.exe -ErrorAction SilentlyContinue)) {
              # Launch in Windows Terminal
              wt.exe powershell -NoExit -Command "& { . ([ScriptBlock]::Create([System.Text.Encoding]::Unicode.GetString([System.Convert]::FromBase64String('${encodedScriptContent}')))) \$paramString }"
              
              # Exit if fresh session
              if ((Get-History).Count -le 1) {
                  exit
              }

              return;
          }

          Invoke-Expression "& { . ([ScriptBlock]::Create([System.Text.Encoding]::Unicode.GetString([System.Convert]::FromBase64String('${encodedScriptContent}')))) \$paramString }"
          EOF

      - name: Create draft release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "raweb_${{ steps.version.outputs.version }}.zip,raweb_${{ steps.version.outputs.version }}__no_web_connect.zip,raweb_${{ steps.version.outputs.version }}__no_docs.zip,raweb_${{ steps.version.outputs.version }}__no_web_connect__no_docs.zip,install.ps1" # comma-delimited list of artifact names
          tag: "${{ steps.version.outputs.version }}"
          name: "Release ${{ steps.version.outputs.version }}"
          draft: true
          generateReleaseNotes: true
          skipIfReleaseExists: true
          body: |
            ## Install this release

            1. **Open PowerShell as an administrator.**
               Press the Windows key + X, then select PowerShell (Administrator) or Terminal (Administrator).

            2. **Copy and paste the code below, and then press enter.**

             ```
            irm https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/install.ps1 | iex
            ```

            3. **Follow the prompts.**

            4. **Install web client prerequisites.**\
               If you plan to use the web client connection method, follow the instructions in our [web client prerequisites documentation](https://raweb.app/docs/web-client/prerequisites) to install and configure the required software.

            > [!IMPORTANT]
            > The installer will retrieve `raweb_${{ steps.version.outputs.version }}.zip` from the release and install it to `C:\Program Files\RAWeb`.
            > Refer to the [wiki](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/docs) for more details.

            > [!NOTE]
            > If Internet Information Services (IIS) or other required components are not already installed, the RAWeb installer will retrieve and install them.

            <details>
              <summary>Advanced installation</summary>

              ### Non-interactive installation

              To install without prompts, use the following command instead:

              ```
              & ([scriptblock]::Create((irm https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/install.ps1))) -Express -Overwrite
              ```

              If RAWeb is already installed, **installing with this option will replace the existing installed files.** Resources, policies, and other data in `/App_Data` will be preserved.

              ### Supported parameters

              | Parameter | Type | Description |
              |---|---|---|
              | `-Express` | switch | Install with all defaults, no prompts |
              | `-Overwrite` | switch | Skip confirmation when upgrading an existing installation |
              | `-InstallDir` | string | Override the installation directory |
              | `-WebSite` | string | IIS web site to install into |
              | `-VirtualPath` | string | Virtual path within the web site (e.g. `RAWeb`) |
              | `-AnonymousAuthMode` | string | Anonymous access mode: `never`, `allow`, or `always` |
              | `-AcceptAll` | switch | Alias for `-Express` (backwards compatibility) |

              ### Verbose installation

              To show verbose logs, use the following command instead:

              ```
              & ([scriptblock]::Create((irm https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/install.ps1))) -Verbose -Debug
              ```

            </details>
            <br/>
