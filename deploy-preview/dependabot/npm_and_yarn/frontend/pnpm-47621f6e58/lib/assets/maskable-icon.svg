<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #64b5f6; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #1976d2; stop-opacity: 1" />
    </linearGradient>
    <linearGradient id="yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #ffd54f; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #f57c00; stop-opacity: 1" />
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #ef5350; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #c62828; stop-opacity: 1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #81c784; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #2e7d32; stop-opacity: 1" />
    </linearGradient>
  </defs>

  <!-- Transparent background -->
  <rect width="100" height="100" fill="none" />

  <!-- Grid of apps -->
  <g filter="drop-shadow(0 1px 2px rgba(0,0,0,0.075))">
    <rect x="26" y="26" width="20" height="20" rx="4" fill="url(#blue)" />
    <rect x="54" y="26" width="20" height="20" rx="4" fill="url(#yellow)" />
    <rect x="26" y="54" width="20" height="20" rx="4" fill="url(#red)" />
    <circle cx="64" cy="64" r="10" fill="url(#green)" />
  </g>
</svg>
